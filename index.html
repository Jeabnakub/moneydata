<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WorkPermit Command Center</title>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://cdn.jsdelivr.net/npm/chart.js"></script>
    <link href="https://fonts.googleapis.com/css2?family=Kanit:wght@300;400;600&display=swap" rel="stylesheet">
    <style>
        body { font-family: 'Kanit', sans-serif; background: #0f172a; color: white; }
        .glass-card { background: rgba(30, 41, 59, 0.7); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.1); }
    </style>
</head>
<body class="p-8">

    <div class="max-w-7xl mx-auto">
        <header class="mb-10">
            <h1 class="text-3xl font-bold bg-gradient-to-r from-blue-400 to-emerald-400 bg-clip-text text-transparent">WorkPermit Command Center</h1>
            <p class="text-slate-400">ระบบติดตามและวิเคราะห์ข้อมูลสถานะแรงงานแบบเรียลไทม์</p>
        </header>

        <!-- Charts Grid -->
        <div class="grid grid-cols-1 lg:grid-cols-2 gap-6 mb-8">
            <div class="glass-card p-6 rounded-2xl">
                <h2 class="text-lg mb-4 text-slate-300">สัดส่วนสถานะการดำเนินการ</h2>
                <canvas id="statusDoughnut" height="200"></canvas>
            </div>
            <div class="glass-card p-6 rounded-2xl">
                <h2 class="text-lg mb-4 text-slate-300">แนวโน้มปริมาณงานแยกตามกลุ่ม</h2>
                <canvas id="statusBar" height="200"></canvas>
            </div>
        </div>

        <!-- Data Table -->
        <div class="glass-card rounded-2xl p-6">
            <h2 class="text-lg mb-4 text-slate-300">รายละเอียดรายการล่าสุด</h2>
            <table class="w-full text-left">
                <thead>
                    <tr class="text-slate-400 text-sm border-b border-slate-700">
                        <th class="pb-4">นายจ้าง</th>
                        <th class="pb-4">แรงงาน</th>
                        <th class="pb-4">สถานะ</th>
                    </tr>
                </thead>
                <tbody id="table-body" class="text-sm"></tbody>
            </table>
        </div>
    </div>

    <script>
        // ข้อมูลตัวอย่างสำหรับทดสอบกราฟ
        const chartData = {
            labels: ['สำเร็จ', 'รอดำเนินการ', 'ต้องแก้ไข'],
            datasets: [{
                data: [65, 25, 10],
                backgroundColor: ['#10b981', '#f59e0b', '#f43f5e']
            }]
        };

        const ctxDoughnut = document.getElementById('statusDoughnut').getContext('2d');
        new Chart(ctxDoughnut, { type: 'doughnut', data: chartData });

        const ctxBar = document.getElementById('statusBar').getContext('2d');
        new Chart(ctxBar, { 
            type: 'bar', 
            data: { labels: ['งานบริษัท', 'งานรายบุคคล'], datasets: [{ label: 'งานคงค้าง', data: [40, 20], backgroundColor: '#3b82f6' }] } 
        });

        async function updateSystem() {
            // URL ที่อัปเดตแล้ว
            const API_URL = 'https://script.google.com/macros/s/AKfycbyA73Q9VrGoijvp5Eszh35GME3YUJ4rleVKipxcNHneRg_vJHkdaKMTHEj-Ao1RAKsj/exec';
            try {
                const response = await fetch(API_URL);
                const data = await response.json();
                
                const tbody = document.getElementById('table-body');
                tbody.innerHTML = data.map(d => `
                    <tr class="border-b border-slate-800 hover:bg-white/5 transition">
                        <td class="py-4">${d.employer || '-'}</td>
                        <td class="py-4">${d.worker || '-'}</td>
                        <td class="py-4"><span class="px-2 py-1 rounded ${d.status === 'สำเร็จ' ? 'bg-emerald-900 text-emerald-300' : 'bg-amber-900 text-amber-300'}">${d.status || 'รอดำเนินการ'}</span></td>
                    </tr>
                `).join('');
            } catch (error) { console.error("Error fetching data:", error); }
        }

        // อัปเดตข้อมูลทุก 60 วินาที
        setInterval(updateSystem, 60000);
        updateSystem();
    </script>
</body>
</html>
